<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make - Create Your Perfume</title>
<link rel="stylesheet" href="css/make.css">
<script src="js/make.js" defer></script>
</head>
<body>

<!-- Top Navigation -->
<div class="top-nav">
    <a href="index.html"><img src="Assets/Home.png" alt="Home" class="home-btn"></a>
    <a href="recommendations.html"><img src="Assets/Play.png" alt="Play" class="play-btn"></a>
    <img src="Assets/Make/X.png" class="potion-x" alt="Remove Scent">
    <img src="Assets/Make/Check.png" class="potion-check" alt="Confirm Scent">
</div>

<!-- Background Bottle -->
<img src="Assets/bottle.png" class="hero-background-bottle" alt="Background Bottle">

<!-- Hero Section: Instructions + Potion + Click & Drag -->
<div class="hero-section">

    <!-- Top Instruction -->
    <div class="make-instructions">
        <img src="Assets/Make/You may pick up to 5 scents.png" alt="Limit Note">
    </div>

    <!-- Potion Bottle -->
    <div class="potion-container">
        <img src="Assets/potion-bottle.png" class="potion-bottle" alt="Potion Bottle">
        <div class="potion-fill"></div>
    </div>

    <!-- Click & Drag Instructions -->
    <div class="make-click-drag">
        <img src="Assets/Make/click-drag.png" alt="Click and drag and put in potion bottle">
    </div>

</div>

<!-- Main Make Container: Scents Grid -->
<main class="make-container">
    <section class="make-grid">
        <img src="Assets/Make/Caramel.png" alt="Caramel" draggable="true">
        <img src="Assets/Make/Cedarwood 1.png" alt="Cedarwood" draggable="true">
        <img src="Assets/Make/Fresh Linen.png" alt="Fresh Linen" draggable="true">
        <img src="Assets/Make/Hibiscus.png" alt="Hibiscus" draggable="true">
        <img src="Assets/Make/Jasmine 1.png" alt="Jasmine" draggable="true">
        <img src="Assets/Make/Orange Blossom 1.png" alt="Orange Blossom" draggable="true">
        <img src="Assets/Make/Oud.png" alt="Oud" draggable="true">
        <img src="Assets/Make/Petrichor.png" alt="Petrichor" draggable="true">
        <img src="Assets/Make/Rose.png" alt="Rose" draggable="true">
        <img src="Assets/Make/Sandalwood 1.png" alt="Sandalwood" draggable="true">
        <img src="Assets/Make/Sugar Cookie.png" alt="Sugar Cookie" draggable="true">
        <img src="Assets/Make/Tuberose (3) 1.png" alt="Tuberose" draggable="true">
        <img src="Assets/Make/Vanilla 1.png" alt="Vanilla" draggable="true">
        <img src="Assets/Make/aquatic.png" alt="Aquatic" draggable="true">
        <img src="Assets/Make/berries.png" alt="Berries" draggable="true">
        <img src="Assets/Make/citrus.png" alt="Citrus" draggable="true">
        <img src="Assets/Make/peach.png" alt="Peach" draggable="true">
        <img src="Assets/Make/poppy.png" alt="Poppy" draggable="true">
    </section>
</main>

<!-- Corner Borders -->
<img src="Assets/Border left.png" class="border-bottom-left" alt="Bottom Left Border">
<img src="Assets/Border right.png" class="border-top-right" alt="Top Right Border">

</body>
</html>
